    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glade Cocktail Bar | Carta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,800;1,400&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        html {
            background-color: #0A0A0A; /* Negro profundo */
        }

        body {
            font-family: 'Montserrat', sans-serif;
            color: #EDEDED;
            background-color: transparent;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            margin: 0 auto;
            max-width: 28rem; /* Ancho de teléfono móvil (max-w-md de Tailwind) */
            background-image: url('tigre.jpeg');
            background-size: cover;
            background-position: center;
            opacity: 0.15; /* Sube la opacidad (0 a 1) para que se vea más nítido */
            z-index: -1;
            pointer-events: none;
        }

        .font-title {
            font-family: 'Space Mono', monospace;
        }

        /* Colores Neón personalizados */
        .text-neon-fuchsia { color: #FF00FF; text-shadow: 0 0 8px rgba(255, 0, 255, 0.6); }
        .text-neon-cyan { color: #00FFFF; text-shadow: 0 0 8px rgba(0, 255, 255, 0.6); }
        
        .border-neon-fuchsia { 
            border-color: #FF00FF; 
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.4), inset 0 0 5px rgba(255, 0, 255, 0.2); 
        }
        .border-neon-cyan { 
            border-color: #00FFFF; 
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.4), inset 0 0 5px rgba(0, 255, 255, 0.2); 
        }

        .bg-dark-panel { background-color: #121212; }
        .bg-card { background-color: #1A1A1A; }

        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .no-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>

<body class="text-gray-200">

<header class="max-w-md mx-auto bg-[#050505] text-white h-20 sticky top-0 z-50 flex justify-center items-center shadow-[0_5px_15px_rgba(0,0,0,0.8)] border-b border-[#333] relative">
    
    <div id="header-title" class="absolute left-1/2 -translate-x-1/2 flex justify-center items-center">
       <img id="header-logo" src="logo_glade.png" 
            class="h-[60px] object-contain">
    </div>
    
    <button id="btn-atras" onclick="history.back()"
        class="hidden absolute left-4 text-xs bg-black px-3 py-2 rounded border border-neon-fuchsia text-[#FF00FF] font-title font-bold z-10 uppercase tracking-widest active:scale-95 transition-transform">
        ← Volver
    </button>
</header>

    <main class="max-w-md mx-auto p-4">

        <div id="vista-categorias" class="fade-in space-y-5 pb-20">
            <h2 class="text-center text-2xl font-title my-6 text-white tracking-widest uppercase">
                Menú Glade
            </h2>
            <div id="contenedor-categorias-principal" class="space-y-5"></div>
        </div>

        <div id="vista-platos" class="hidden fade-in">
            <h3 id="titulo-actual"
                class="text-xl font-title mb-6 flex items-center uppercase tracking-widest text-[#00FFFF] drop-shadow-[0_0_5px_rgba(0,255,255,0.5)] leading-tight">
                <span class="w-10 h-[2px] bg-[#00FFFF] mr-3 flex-shrink-0"></span>
                CATEGORÍA
            </h3>
            <div id="grid-platos" class="grid grid-cols-2 gap-4 pb-10"></div>
        </div>
    </main>

    <div id="dish-detail"
        class="fixed inset-0 max-w-md mx-auto z-[60] transform translate-y-full transition-transform duration-500 ease-in-out overflow-y-auto"
        style="background-color: #050505;">

        <button onclick="closeDetail()"
            class="absolute top-6 right-6 bg-[#1A1A1A] text-[#FF00FF] w-12 h-12 rounded shadow-2xl z-10 font-bold border border-neon-fuchsia flex items-center justify-center text-xl active:scale-90 transition-transform">✕</button>

        <div class="flex flex-col items-center justify-center min-h-screen p-6">

            <div class="relative mb-10 mt-10">
                <div
                    class="w-60 h-60 rounded-full border-2 border-neon-cyan overflow-hidden shadow-[0_0_30px_rgba(0,255,255,0.2)] bg-card">
                    <img id="detail-img" src="" class="w-full h-full object-cover opacity-90">
                </div>
                <div
                    class="absolute -bottom-4 left-1/2 -translate-x-1/2 bg-[#0A0A0A] px-6 py-2 rounded border border-neon-fuchsia shadow-lg min-w-[120px] text-center">
                    <span id="detail-price" class="text-[#FF00FF] font-title font-bold text-xl tracking-wider"></span>
                </div>
            </div>

            <div class="w-full bg-card rounded p-8 shadow-2xl border-t-4 border-[#00FFFF] relative">
                
                <h2 id="detail-title" class="text-2xl font-title text-neon-cyan text-center mb-6 uppercase tracking-wider leading-tight">
                </h2>

                <div class="space-y-8">
                    <div class="text-center">
                        <h4 class="text-[10px] uppercase tracking-[0.4em] text-gray-500 font-bold mb-3">
                            Mixología & Ingredientes</h4>
                        <p id="detail-ingredients"
                            class="text-gray-300 text-sm leading-relaxed font-light px-2"></p>
                    </div>

                    <div class="text-center pt-4 border-t border-[#333]">
                        <h4 class="text-[10px] uppercase tracking-[0.4em] text-gray-500 font-bold mb-4">
                            Alérgenos</h4>
                        <div id="detail-alergenos" class="flex justify-center gap-4 mt-2">
                        </div>
                    </div>
                </div>

                <button onclick="closeDetail()"
                    class="mt-10 w-full bg-[#0A0A0A] text-white py-4 rounded font-title font-bold shadow-lg border border-neon-cyan active:scale-95 transition-transform uppercase tracking-widest text-xs hover:bg-[#00FFFF] hover:text-black hover:shadow-[0_0_15px_rgba(0,255,255,0.6)]">
                    Regresar
                </button>
            </div>

            <p class="mt-8 text-gray-600 text-[10px] uppercase tracking-[0.5em] font-title">Glade Cocktail Bar</p>
        </div>
    </div>

        function renderCategorias() {
            const container = document.getElementById('contenedor-categorias-principal');
            container.innerHTML = categorias.map(cat => `
                <div onclick="filtrar('${cat.id}')" class="relative h-36 rounded overflow-hidden shadow-lg border border-[#333] active:scale-95 transition-transform cursor-pointer hover:border-neon-cyan group">
                    <img src="${cat.foto}" loading="lazy" class="absolute inset-0 w-full h-full object-cover opacity-40 bg-[#1A1A1A] group-hover:opacity-60 transition-opacity" alt="${cat.id}">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex items-end justify-center pb-4">
                        <span class="text-white text-xl font-title tracking-[0.2em] uppercase drop-shadow-md text-center px-2 leading-tight">${cat.id}</span>
                    </div>
                </div>
            `).join('');
        }

        function filtrar(cat) {
            const filtrados = platos.filter(p => p.categoria === cat);

            document.getElementById('vista-categorias').classList.add('hidden');
            document.getElementById('vista-platos').classList.remove('hidden');
            document.getElementById('btn-atras').classList.remove('hidden');
            document.getElementById('header-title').classList.add('hidden');
            document.getElementById('titulo-actual').innerText = cat;
            
            const grid = document.getElementById('grid-platos');
            grid.innerHTML = '';
            
            if (filtrados.length === 0) {
                grid.innerHTML = '<p class="col-span-2 text-center text-gray-500 py-10 font-title text-sm uppercase">Próximamente</p>';
            } else {
                filtrados.forEach(plato => {
                    grid.innerHTML += `
                        <div onclick="openDetail(${plato.id})" class="bg-card rounded shadow-lg overflow-hidden active:scale-95 transition-transform duration-200 text-center border-b-2 border-[#FF00FF] flex flex-col h-full">
                            <img src="${plato.foto}" loading="lazy" class="w-full h-40 object-cover opacity-80 flex-shrink-0">
                            <div class="p-4 flex flex-col justify-between flex-grow">
                                <h4 class="font-title text-sm tracking-wide leading-tight text-gray-200">${plato.nombre}</h4>
                                <p class="text-[#00FFFF] font-title font-bold text-base mt-2 whitespace-nowrap">${plato.precio}</p>
                            </div>
                        </div>`;
                });
            }
            history.pushState({ view: 'platos' }, "");
            window.scrollTo(0, 0);
        }

        function openDetail(id) {
            const p = platos.find(x => x.id === id);
            document.getElementById('detail-img').src = p.foto;
            document.getElementById('detail-title').innerText = p.nombre;
            document.getElementById('detail-price').innerText = p.precio;
            
            const divIngredientes = document.getElementById('detail-ingredients');
            const divAlergenos = document.getElementById('detail-alergenos');

            divIngredientes.innerText = p.ingredientes;
            divAlergenos.innerHTML = p.alergenos && p.alergenos.length > 0 ? p.alergenos.map(a => `
                <div class="w-10 h-10 rounded border border-neon-cyan flex items-center justify-center bg-[#050505] text-lg shadow-[0_0_10px_rgba(0,255,255,0.2)]">
                    ${a}
                </div>`).join('') : '<span class="text-xs text-gray-600 font-light">Sin alérgenos declarados*</span>';

            document.getElementById('dish-detail').classList.remove('translate-y-full');
            document.body.style.overflow = 'hidden';
            history.pushState({ view: 'detalle' }, "");
        }

        function closeDetail() {
            document.getElementById('dish-detail').classList.add('translate-y-full');
            document.body.style.overflow = 'auto';
        }

        window.onload = renderCategorias;

        window.onpopstate = function(event) {
            const detailOpen = !document.getElementById('dish-detail').classList.contains('translate-y-full');
            const platosOpen = !document.getElementById('vista-platos').classList.contains('hidden');

            if (detailOpen) {
                closeDetail();
            } 
            else if (platosOpen) {
                document.getElementById('vista-categorias').classList.remove('hidden');
                document.getElementById('vista-platos').classList.add('hidden');
                document.getElementById('btn-atras').classList.add('hidden');
                document.getElementById('header-title').classList.remove('hidden');
            }
        };
    </script>

</body>
</html>
